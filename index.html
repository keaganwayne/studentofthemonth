<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>SCLS Grade 6 - Student of the Month</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700&family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "secondary-container": "#40495b",
            "surface-container-high": "#262a33",
            "background": "#10131b",
            "outline": "#999077",
            "error": "#ffb4ab",
            "outline-variant": "#4d4732",
            "surface-tint": "#e9c400",
            "on-error": "#690005",
            "inverse-surface": "#e0e2ee",
            "primary-container": "#ffd700",
            "primary": "#fff6df",
            "on-surface-variant": "#d0c6ab",
            "on-background": "#e0e2ee",
            "surface-container-highest": "#31353e",
            "error-container": "#93000a",
            "surface-variant": "#31353e",
            "on-surface": "#e0e2ee",
            "surface-container": "#1c2028",
            "surface-container-low": "#181c24",
            "surface-container-lowest": "#0a0e16",
            "surface": "#10131b",
            "on-primary": "#3a3000",
            "warning": "#ffb020",
            "success": "#6ee7b7"
          },
          borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", "2xl": "1rem", full: "9999px" },
          spacing: { "margin-desktop": "64px", "max-width": "1280px", gutter: "24px", "margin-mobile": "16px", unit: "8px" },
          fontFamily: {
            "headline-md": ["Epilogue"],
            "body-base": ["Manrope"],
            "label-sm": ["Space Grotesk"],
            "display-lg": ["Epilogue"]
          },
          fontSize: {
            "headline-md": ["32px", { lineHeight: "1.2", letterSpacing: "-0.01em", fontWeight: "600" }],
            "body-base": ["16px", { lineHeight: "1.6", letterSpacing: "0", fontWeight: "400" }],
            "label-sm": ["12px", { lineHeight: "1.0", letterSpacing: "0.05em", fontWeight: "500" }],
            "display-lg": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }]
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="bg-background text-on-background min-h-screen relative overflow-x-hidden antialiased font-body-base">
  <div class="fixed inset-0 z-[-1] star-field opacity-50"></div>
  <div class="fixed inset-0 z-[-1] star-field opacity-30 bg-[position:40px_60px] scale-150"></div>
  <div class="fixed inset-0 z-[-1] bg-gradient-to-b from-background via-background/90 to-background"></div>

  <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-black/60 backdrop-blur-md border-b border-white/10 shadow-[0_0_20px_rgba(255,215,0,0.1)] rounded-b-lg">
    <button id="brandHome" class="flex items-center gap-2 text-left" type="button" title="Home">
      <span class="material-symbols-outlined text-yellow-500" style="font-variation-settings: 'FILL' 1;">star</span>
      <span class="hidden sm:inline text-xl font-bold uppercase tracking-widest text-yellow-500 drop-shadow-[0_0_8px_rgba(255,215,0,0.6)] font-headline-md">SCLS Awards</span>
    </button>
    <nav id="desktopNav" class="hidden md:flex fixed top-0 left-1/2 transform -translate-x-1/2 z-[60] h-16 items-center gap-8"></nav>
    <div class="flex items-center gap-3">
      <span id="modeBadge" class="hidden sm:inline-flex text-[10px] uppercase tracking-widest rounded-full border border-yellow-500/30 px-2 py-1 text-yellow-300 bg-yellow-500/10"></span>
      <button id="teacherPill" class="rounded-full border border-yellow-500/30 bg-surface-container-high/80 px-3 py-2 text-xs md:text-sm text-on-surface-variant hover:text-yellow-300 transition-colors" type="button">Select teacher</button>
    </div>
  </header>

  <main id="app" class="pt-[92px] pb-[100px] px-margin-mobile md:px-margin-desktop max-w-max-width mx-auto"></main>

  <nav id="mobileNav" class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 py-3 pb-safe bg-black/80 backdrop-blur-xl rounded-t-2xl shadow-[0_-10px_30px_rgba(0,0,0,0.5)] border-t border-white/20"></nav>

  <div id="toastHost" class="fixed bottom-24 right-4 z-[100] flex flex-col gap-3 max-w-[420px]"></div>

  <script src="./config.js"></script>
  <script src="./seed-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
